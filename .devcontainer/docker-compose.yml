services:
  app:
    image: mcr.microsoft.com/devcontainers/python:1-3.12
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      OLLAMA_API_BASE: http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["ollama", "serve"]
    # Décommenter pour activer le passthrough GPU NVIDIA :
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-models:
