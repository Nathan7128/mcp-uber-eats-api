services:
  app:
    image: mcr.microsoft.com/devcontainers/python:1-3.12
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      OLLAMA_API_BASE: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["ollama", "serve"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    # Decommenter pour activer le passthrough GPU NVIDIA :
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-models:
